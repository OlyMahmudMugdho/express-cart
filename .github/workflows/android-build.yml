name: Android Native Build

on:
  push:
    branches: [render]
    paths:
      - "mobile/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          # Caching disabled to avoid path resolution errors

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          # Caching disabled because /android folder is generated dynamically

      - name: 📦 Install dependencies
        working-directory: mobile
        run: npm install

      - name: 🛠 Prebuild (Generate /android folder)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      - name: 🔑 Prepare Keystore
        working-directory: mobile
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: ⚙️ Grant execute permission for gradlew
        run: chmod +x mobile/android/gradlew

      - name: 🏗 Build with Gradle
        working-directory: mobile/android
        run: ./gradlew assembleRelease
        env:
          MYAPP_RELEASE_STORE_FILE: release.keystore
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 📂 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile/android/app/build/outputs/apk/release/*.apk
