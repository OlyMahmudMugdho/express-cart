name: Android Native Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          # Fixed path: leading dot-slash helps resolution in subdirectories
          cache-dependency-path: './mobile/package-lock.json'

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 📦 Install dependencies
        working-directory: mobile
        run: npm install

      - name: 🛠 Prebuild (Generate /android folder)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      - name: 🔑 Prepare Keystore
        working-directory: mobile
        run: |
          # Create the directory if prebuild didn't for some reason
          mkdir -p android/app
          # Decode the secret into a physical file Gradle can see
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: ⚙️ Grant execute permission for gradlew
        run: chmod +x mobile/android/gradlew

      - name: 🏗 Build with Gradle
        working-directory: mobile/android
        # Using assembleRelease to generate the APK
        run: ./gradlew assembleRelease
        env:
          # These map to the variables typically used in a React Native build.gradle
          MYAPP_RELEASE_STORE_FILE: release.keystore
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 📂 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # This path targets the standard output for Gradle APK builds
          path: mobile/android/app/build/outputs/apk/release/*.apk
